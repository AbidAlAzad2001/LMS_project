databases:
  - name: LMS_db
    plan: free
    databaseName: LMS_db

build:
  dockerfile: Dockerfile

web:
  name: lms-ai
  plan: free
  buildCommand: ./build.sh
  runCommand: gunicorn LMS.wsgi:application --bind 0.0.0.0:$PORT
  envVars:
    - key: SECRET_KEY
      generateValue: true
    - key: DEBUG
      value: False
    - key: DATABASE_URL
      fromDatabase:
        name: LMS_db
        attribute: connectionString
