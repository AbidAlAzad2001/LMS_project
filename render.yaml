databases:
  - name: lms_ai_db
    plan: free
    databaseName: lms_ai_db

build:
  dockerfile: Dockerfile

web:
  name: lms-ai
  plan: free
  buildCommand: ./build.sh
  runCommand: gunicorn lms_ai.wsgi:application --bind 0.0.0.0:$PORT
  envVars:
    - key: SECRET_KEY
      generateValue: true
    - key: DEBUG
      value: False
    - key: DATABASE_URL
      fromDatabase:
        name: lms_ai_db
        attribute: connectionString
