{% extends 'base.html' %}

{% block title %}Resend Verification Email - Django LMS{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-8">
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-200 dark:border-gray-700">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-4">Resend Verification Email</h1>
        
        <p class="text-gray-600 dark:text-gray-400 mb-6">
            Enter your email address and we'll send you a new verification link.
        </p>
        
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="w-full px-6 py-3 bg-accent text-white rounded-lg hover:bg-blue-600 transition">
                <i class="fas fa-envelope mr-2"></i>Send Verification Email
            </button>
        </form>
        
        <p class="mt-6 text-center text-gray-600 dark:text-gray-400">
            <a href="{% url 'home' %}" class="text-accent hover:underline">Back to Home</a>
        </p>
    </div>
</div>
{% endblock %}
