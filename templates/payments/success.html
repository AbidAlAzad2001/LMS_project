{% extends 'base.html' %}

{% block title %}Payment Success - LearnSphere{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full text-center">
        <div class="w-24 h-24 bg-gradient-to-br from-green-400 to-green-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
            <i class="fas fa-check text-5xl text-white"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-4">Payment Successful!</h1>
        <p class="text-gray-600 dark:text-gray-400 mb-8">Your payment was processed successfully. You are now enrolled in the course.</p>
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 border border-gray-200 dark:border-gray-700 mb-6">
            <div class="flex items-center justify-center gap-2 text-green-500 mb-4">
                <i class="fas fa-check-circle text-2xl"></i>
                <span class="text-lg font-semibold">Enrollment Confirmed</span>
            </div>
            <p class="text-gray-600 dark:text-gray-400">You can now start learning!</p>
        </div>
        <a href="{% url 'my_courses' %}" class="inline-block bg-gradient-to-r from-primary to-secondary text-white px-8 py-3 rounded-xl font-semibold hover:opacity-90 transition">
            <i class="fas fa-play mr-2"></i>Go to My Courses
        </a>
    </div>
</div>
{% endblock %}
