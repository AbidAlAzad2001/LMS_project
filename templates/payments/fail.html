{% extends 'base.html' %}

{% block title %}Payment Failed - LearnSphere{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full text-center">
        <div class="w-24 h-24 bg-gradient-to-br from-red-400 to-red-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
            <i class="fas fa-times text-5xl text-white"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-4">Payment Failed</h1>
        <p class="text-gray-600 dark:text-gray-400 mb-8">Unfortunately, your payment could not be processed. Please try again.</p>
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 border border-gray-200 dark:border-gray-700 mb-6">
            <p class="text-gray-600 dark:text-gray-400">Don't worry, no money was charged. You can try again or contact support.</p>
        </div>
        <a href="{% url 'dashboard' %}" class="inline-block bg-gradient-to-r from-primary to-secondary text-white px-8 py-3 rounded-xl font-semibold hover:opacity-90 transition">
            <i class="fas fa-home mr-2"></i>Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
