{% extends 'base.html' %}

{% block title %}Payment Cancelled - Django LMS{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full text-center">
        <div class="w-24 h-24 bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
            <i class="fas fa-exclamation text-5xl text-white"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-4">Payment Cancelled</h1>
        <p class="text-gray-600 dark:text-gray-400 mb-8">Your payment was cancelled. No charges were made.</p>
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 border border-gray-200 dark:border-gray-700 mb-6">
            <p class="text-gray-600 dark:text-gray-400">No worries! You can continue browsing courses or try again later.</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{% url 'course_list' %}" class="bg-gradient-to-r from-primary to-secondary text-white px-6 py-3 rounded-xl font-semibold hover:opacity-90 transition">
                <i class="fas fa-compass mr-2"></i>Browse Courses
            </a>
            <a href="{% url 'dashboard' %}" class="px-6 py-3 border-2 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-xl font-semibold hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                <i class="fas fa-home mr-2"></i>Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
